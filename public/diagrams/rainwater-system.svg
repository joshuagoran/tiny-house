<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 680 620" width="680" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="aw" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#3B8BD4" stroke-width="1.5" stroke-linecap="round"/></marker>
  <marker id="ag" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round"/></marker>
</defs>

<!-- Collection sources -->
<rect x="100" y="20" width="220" height="44" rx="8" fill="#F5EDD8" stroke="#B8923E" stroke-width="0.5"/>
<text font-family="system-ui, sans-serif" font-size="12" font-weight="500" fill="#B8923E" x="210" y="38" text-anchor="middle">House roof (238 sq ft)</text>
<text font-family="system-ui, sans-serif" font-size="10" fill="#9C9889" x="210" y="54" text-anchor="middle">metal · gutter on low/interior side</text>

<rect x="360" y="20" width="220" height="44" rx="8" fill="#F5EDD8" stroke="#B8923E" stroke-width="0.5"/>
<text font-family="system-ui, sans-serif" font-size="12" font-weight="500" fill="#B8923E" x="470" y="38" text-anchor="middle">Porch roof (224 sq ft)</text>
<text font-family="system-ui, sans-serif" font-size="10" fill="#9C9889" x="470" y="54" text-anchor="middle">pitches away · gutter on outer edge</text>

<!-- Join lines -->
<line x1="210" y1="64" x2="210" y2="84" stroke="#3B8BD4" stroke-width="1"/>
<line x1="470" y1="64" x2="470" y2="84" stroke="#3B8BD4" stroke-width="1"/>
<line x1="210" y1="84" x2="470" y2="84" stroke="#3B8BD4" stroke-width="1"/>
<line x1="340" y1="84" x2="340" y2="108" stroke="#3B8BD4" stroke-width="1.5" marker-end="url(#aw)"/>
<text font-family="system-ui, sans-serif" font-size="10" fill="#9C9889" x="340" y="98" text-anchor="middle">~462 sq ft combined</text>

<!-- First flush diverter -->
<rect x="270" y="112" width="140" height="44" rx="8" fill="#F5EDD8" stroke="#B8923E" stroke-width="0.5"/>
<text font-family="system-ui, sans-serif" font-size="12" font-weight="500" fill="#B8923E" x="340" y="132" text-anchor="middle">First flush diverter</text>
<text font-family="system-ui, sans-serif" font-size="10" fill="#9C9889" x="340" y="148" text-anchor="middle">Diverts first 2-3 gal</text>
<line x1="410" y1="134" x2="450" y2="134" stroke="#B8923E" stroke-width="0.8" marker-end="url(#aw)"/>
<text font-family="system-ui, sans-serif" font-size="10" fill="#9C9889" x="490" y="138" text-anchor="middle">to ground</text>

<line x1="340" y1="156" x2="340" y2="178" stroke="#3B8BD4" stroke-width="1.5" marker-end="url(#aw)"/>

<!-- Leaf screen -->
<rect x="280" y="182" width="120" height="36" rx="6" fill="#F1EFE8" stroke="#D8D4CB" stroke-width="0.5"/>
<text font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#6B6860" x="340" y="204" text-anchor="middle">Leaf screen</text>

<line x1="340" y1="218" x2="340" y2="240" stroke="#3B8BD4" stroke-width="1.5" marker-end="url(#aw)"/>

<!-- Storage tank -->
<rect x="250" y="244" width="180" height="56" rx="10" fill="#E6F1FB" stroke="#5A7C96" stroke-width="0.5"/>
<text font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#185FA5" x="340" y="268" text-anchor="middle">Storage tank</text>
<text font-family="system-ui, sans-serif" font-size="10" fill="#5A7C96" x="340" y="284" text-anchor="middle">500-1,000 gal · opaque · food-grade</text>

<!-- Capture estimates -->
<line x1="430" y1="272" x2="480" y2="256" stroke="#D8D4CB" stroke-width="0.5" stroke-dasharray="3 2"/>
<text font-family="system-ui, sans-serif" font-size="10" fill="#9C9889" x="486" y="252" text-anchor="start">~9,300 gal/yr (Marshall)</text>
<text font-family="system-ui, sans-serif" font-size="10" fill="#9C9889" x="486" y="266" text-anchor="start">~13,700 gal/yr (Woodstock)</text>

<line x1="340" y1="300" x2="340" y2="322" stroke="#3B8BD4" stroke-width="1.5" marker-end="url(#aw)"/>

<!-- Pump -->
<rect x="280" y="326" width="120" height="36" rx="6" fill="#F1EFE8" stroke="#D8D4CB" stroke-width="0.5"/>
<text font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#6B6860" x="340" y="348" text-anchor="middle">Pressure pump</text>

<line x1="340" y1="362" x2="340" y2="384" stroke="#3B8BD4" stroke-width="1.5" marker-end="url(#aw)"/>

<!-- Filtration box -->
<rect x="80" y="388" width="520" height="158" rx="10" fill="none" stroke="#1D9E75" stroke-width="0.5" stroke-dasharray="6 3"/>
<text font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#0F6E56" x="340" y="406" text-anchor="middle">Potable filtration</text>

<!-- Stage 1: Spin-down -->
<rect x="98" y="418" width="88" height="46" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#085041" x="142" y="438" text-anchor="middle">Spin-down</text>
<text font-family="system-ui, sans-serif" font-size="9" fill="#0F6E56" x="142" y="454" text-anchor="middle">reusable</text>
<line x1="186" y1="441" x2="204" y2="441" stroke="#1D9E75" stroke-width="1" marker-end="url(#ag)"/>

<!-- Stage 2: Sediment -->
<rect x="208" y="418" width="88" height="46" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#085041" x="252" y="438" text-anchor="middle">Sediment</text>
<text font-family="system-ui, sans-serif" font-size="9" fill="#0F6E56" x="252" y="454" text-anchor="middle">5-10 μm</text>
<line x1="296" y1="441" x2="314" y2="441" stroke="#1D9E75" stroke-width="1" marker-end="url(#ag)"/>

<!-- Stage 3: Carbon -->
<rect x="318" y="418" width="88" height="46" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#085041" x="362" y="438" text-anchor="middle">Carbon</text>
<text font-family="system-ui, sans-serif" font-size="9" fill="#0F6E56" x="362" y="454" text-anchor="middle">1-5 μm</text>
<line x1="406" y1="441" x2="424" y2="441" stroke="#1D9E75" stroke-width="1" marker-end="url(#ag)"/>

<!-- Stage 4: 0.2 μm -->
<rect x="428" y="418" width="88" height="46" rx="6" fill="#EDEAF4" stroke="#534AB7" stroke-width="0.5"/>
<text font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#3C3489" x="472" y="438" text-anchor="middle">0.2 μm</text>
<text font-family="system-ui, sans-serif" font-size="9" fill="#534AB7" x="472" y="454" text-anchor="middle">absolute</text>

<line x1="472" y1="464" x2="472" y2="484" stroke="#1D9E75" stroke-width="1" marker-end="url(#ag)"/>

<!-- Stage 5: UV -->
<rect x="428" y="488" width="88" height="46" rx="6" fill="#F1EFE8" stroke="#D8D4CB" stroke-width="0.5"/>
<text font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#6B6860" x="472" y="508" text-anchor="middle">UV</text>
<text font-family="system-ui, sans-serif" font-size="9" fill="#9C9889" x="472" y="524" text-anchor="middle">optional</text>

<!-- Output to house plumbing -->
<line x1="472" y1="546" x2="472" y2="562" stroke="#3B8BD4" stroke-width="1.5"/>
<line x1="472" y1="562" x2="340" y2="562" stroke="#3B8BD4" stroke-width="1.5"/>
<line x1="340" y1="562" x2="340" y2="582" stroke="#3B8BD4" stroke-width="1.5" marker-end="url(#aw)"/>

<rect x="268" y="586" width="144" height="30" rx="8" fill="#E6F1FB" stroke="#5A7C96" stroke-width="0.5"/>
<text font-family="system-ui, sans-serif" font-size="12" font-weight="500" fill="#185FA5" x="340" y="605" text-anchor="middle">House plumbing</text>
</svg>
